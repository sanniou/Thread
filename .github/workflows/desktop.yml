name: Desktop Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify common architecture on Desktop
        run: >-
          ./gradlew --no-daemon
          :core-domain:jvmTest
          :core-data:jvmTest
          :composeApp:jvmTest
          :composeApp:compileKotlinJvm

      - name: Build Debian package
        run: ./gradlew --no-daemon :composeApp:packageDeb

      - name: Upload Desktop package
        uses: actions/upload-artifact@v7
        with:
          name: thread-desktop-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error
          retention-days: 14
